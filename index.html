<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Yield Calculator</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            max-width: 500px; 
            margin: 2rem auto; 
            padding: 1.5rem; 
            background-color: #f9fafb;
            color: #333;
        }
        .calculator-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #111; }
        .form-group { margin-bottom: 1.2rem; }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: 600; 
            font-size: 0.9rem;
        }
        input, select { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        .result-card { 
            margin-top: 2rem; 
            padding: 1.5rem; 
            background: #eef2ff; 
            border: 1px solid #c7d2fe;
            border-radius: 8px; 
            text-align: center; 
        }
        .result-number { 
            font-size: 2.5rem; 
            font-weight: bold; 
            color: #4f46e5; 
            margin: 0.5rem 0; 
        }
        .extraction-note { 
            font-size: 0.9rem; 
            color: #4b5563; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>Personal Oil Yield Calculator</h2>
        
        <div class="form-group">
            <label for="volume">Target Volume</label>
            <input type="number" id="volume" value="1" min="0.1" step="0.1">
        </div>
        
        <div class="form-group">
            <label for="unit">Unit</label>
            <select id="unit">
                <option value="liters">Liters</option>
                <option value="gallons">Gallons</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="plant">Plant Type</label>
            <select id="plant">
                <option value="olive">Olive Tree</option>
                <option value="sunflower">Sunflower</option>
                <option value="peanut">Peanut</option>
                <option value="canola">Rapeseed / Canola</option>
                <option value="lavender">Lavender (Essential Oil)</option>
            </select>
        </div>

        <div class="result-card">
            <div style="font-weight: 600; color: #374151;">You will need approximately:</div>
            <div class="result-number" id="result-text">...</div>
            <div class="extraction-note" id="note-text">...</div>
        </div>
    </div>

    <script>
        // Data: Average yields in Liters per single plant/tree
        const plantData = {
            olive: { 
                yield: 3.5, 
                unit: "mature trees",
                method: "Cold pressing. At home, this requires pitting/crushing the olives into a paste, malaxing (slowly mixing), and pressing the paste using a manual fruit/wine press." 
            },
            sunflower: { 
                yield: 0.05, 
                unit: "plants",
                method: "Expeller pressing. Best done using a hand-crank or small electric home oil press. Seeds must be dried; hulling them first improves oil clarity." 
            },
            peanut: { 
                yield: 0.04, 
                unit: "plants",
                method: "Expeller pressing. Peanuts should be shelled, dried, and ideally roasted slightly to help release the oil before running them through a home oil press." 
            },
            canola: { 
                yield: 0.01, 
                unit: "plants",
                method: "Expeller pressing. Requires a very tight tolerance mechanical press because the seeds are so small. Not usually recommended for beginners without a specialized seed press." 
            },
            lavender: { 
                yield: 0.002, 
                unit: "plants",
                method: "Steam distillation. Because it's an essential oil, it cannot be pressed. You will need a small copper or stainless steel alembic still to boil the flowers and condense the vapor." 
            }
        };

        function calculate() {
            // Get inputs
            const volumeInput = parseFloat(document.getElementById('volume').value) || 0;
            const unit = document.getElementById('unit').value;
            const plantKey = document.getElementById('plant').value;

            // Convert to Liters if Gallons is selected
            let targetLiters = volumeInput;
            if (unit === 'gallons') {
                targetLiters = volumeInput * 3.78541;
            }

            // Fetch plant data
            const selectedPlant = plantData[plantKey];

            // Calculate amount and round up
            const plantsNeeded = Math.ceil(targetLiters / selectedPlant.yield);

            // Update UI
            document.getElementById('result-text').innerText = `${plantsNeeded.toLocaleString()} ${selectedPlant.unit}`;
            document.getElementById('note-text').innerText = `Home Extraction Method: ${selectedPlant.method}`;
        }

        // Attach event listeners to update automatically when inputs change
        document.getElementById('volume').addEventListener('input', calculate);
        document.getElementById('unit').addEventListener('change', calculate);
        document.getElementById('plant').addEventListener('change', calculate);

        // Run calculation once on page load
        calculate();
    </script>

</body>
</html>
